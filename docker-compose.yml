version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: elegance_studio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mountebank:
    image: bbyars/mountebank:2.9.1
    ports:
      - "2525:2525"
      - "3003:3003"
    volumes:
      - ./imposter:/imposter
    command: start --configfile /imposter/mountebank.json

  api:
    build:
      context: ./api-DarioSabioni-Projeto-Final
      dockerfile: Dockerfile
    ports:
      - "5134:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=elegance_studio;Username=postgres;Password=${POSTGRES_PASSWORD}
      - Jwt__SecretKey=${JWT_SECRET}
      - SmsService__BaseUrl=${MOUNTEBANK_URL}
      - Redis__ConnectionString=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  barbearia:
    build:
      context: ./Barbearia
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5134
    depends_on:
      - api

  dashboard:
    build:
      context: ./elegance-studio-dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5134
      - PORT=3001
    depends_on:
      - api

volumes:
  postgres_data:
